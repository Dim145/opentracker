version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/schema.sql"
    gen:
      go:
        package: "queries"
        out: "internal/queries"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_pointers_for_null_types: true
        emit_db_tags: false
        emit_json_tags: false
        omit_unused_structs: true
