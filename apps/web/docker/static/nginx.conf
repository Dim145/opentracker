# Trackarr static frontend — served as an SPA from /usr/share/nginx/html.
#
# Routing: this container is purely a static asset host. It does NOT
# proxy /api/*, /announce* or anything else upstream — that's the job
# of Caddy (or whatever reverse proxy you already have in front of the
# stack). Pointing Caddy's `/*` at this container instead of the SSR
# `web:3000` is the only change needed to switch to the static path.
#
# Runtime config: the SPA fetches /api/runtime-config on boot and
# patches its useRuntimeConfig() values from there, so the same image
# is portable across domains. See apps/web/plugins/runtime-config.
# client.ts.

worker_processes auto;
pid /tmp/nginx.pid;

# Tiny by design. We're a static asset host, not a busy backend.
events {
  worker_connections 256;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logs to stdout/stderr so docker logs / k8s logs see them.
  access_log    /dev/stdout;
  error_log     /dev/stderr warn;

  # Performance basics.
  sendfile         on;
  tcp_nopush       on;
  tcp_nodelay      on;
  keepalive_timeout 65;
  server_tokens    off;

  # Gzip everything compressible. brotli would be nicer but isn't
  # built into the Chainguard nginx image.
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # Distroless nginx writes its scratch files under /var/cache and
  # /var/run; the unprivileged build of nginx (Chainguard) configures
  # these for us. We just need to confirm the html dir is readable.

  # Default security headers applied on every response. Caddy in
  # front sets HSTS / CSP, so this is mostly a defense-in-depth layer
  # for setups where Caddy is bypassed (direct nginx exposure).
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
  # fonts.googleapis.com / fonts.gstatic.com allow-listed for the
  # Inter + JetBrains Mono import in app/assets/css/main.css.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

  server {
    # Listen on the same port the SSR container uses so the existing
    # Caddy upstream (web:3000) doesn't need a config change to switch
    # between the two builds.
    listen       3000 default_server;
    listen       [::]:3000 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long cache for hashed Nuxt build assets. Nuxt fingerprints
    # filenames in /_nuxt/ so we can be aggressive here.
    location /_nuxt/ {
      expires    1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files  $uri =404;
    }

    # Other static assets (favicons, images uploaded into /public).
    location ~* \.(?:ico|jpg|jpeg|png|gif|svg|webp|woff2?|ttf|eot|otf|css|js)$ {
      expires    7d;
      add_header Cache-Control "public, max-age=604800";
      try_files  $uri =404;
    }

    # Force-revalidate the entry document so a deploy lands on every
    # browser without a hard reload.
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      try_files  $uri =404;
    }

    # Health probe — useful for k8s readiness.
    location = /healthz {
      access_log off;
      return     200 'ok';
      add_header Content-Type text/plain;
    }

    # SPA fallback — let vue-router / nuxt page routing handle deep
    # links by always returning index.html when no asset matches.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
