# Trackarr documentation — distroless nginx config.
#
# VitePress generates a fully static, multi-page site (one .html per
# .md plus a fingerprinted /assets/ tree). No SPA fallback is needed
# — every URL maps to a real file on disk. A request for an unknown
# route returns a clean 404 served by VitePress's own 404 page.

worker_processes auto;
pid /tmp/nginx.pid;

# This is a tiny static-asset host: a couple-hundred connections is
# plenty for any documentation traffic pattern.
events {
  worker_connections 256;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  access_log    /dev/stdout;
  error_log     /dev/stderr warn;

  sendfile         on;
  tcp_nopush       on;
  tcp_nodelay      on;
  keepalive_timeout 65;
  server_tokens    off;

  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # Default security headers. The CSP is intentionally tighter than
  # the application's because VitePress only embeds the data scripts
  # it generates itself — no runtime fetch beyond Google Fonts.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

  server {
    # 8080 because the Chainguard distroless nginx runs as a non-root
    # user and binding < 1024 would need CAP_NET_BIND_SERVICE.
    listen       8080 default_server;
    listen       [::]:8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # VitePress fingerprints everything under /assets/. Long-cache the
    # whole tree — the URL changes whenever the content does.
    location /assets/ {
      expires    1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files  $uri =404;
    }

    # Other static asset extensions (favicons, images dropped into
    # /public, sitemaps, etc.) — week-long cache so a refresh isn't
    # cheap-but-not-free, but old files don't poison browsers if we
    # rename a logo.
    location ~* \.(?:ico|jpg|jpeg|png|gif|svg|webp|woff2?|ttf|eot|otf|css|js|json|map|txt|xml)$ {
      expires    7d;
      add_header Cache-Control "public, max-age=604800";
      try_files  $uri =404;
    }

    # HTML pages: revalidate on every load so a deploy reaches every
    # browser without a hard reload. The Pages workflow rebuilds the
    # whole tree on each commit, so caching the rendered HTML beyond
    # the request just delays the new content.
    location ~* \.html$ {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      try_files  $uri =404;
    }

    # k8s / orchestrator readiness probe.
    location = /healthz {
      access_log off;
      return     200 'ok';
      add_header Content-Type text/plain;
    }

    # Default catch-all. Three try_files arms cover the VitePress
    # output shapes:
    #   - $uri           → exact file (e.g. /assets/app.123.js)
    #   - $uri.html      → page lookup without extension; lets a
    #                      visitor / external link to
    #                      `/guide/getting-started` resolve to
    #                      `/guide/getting-started.html` even though
    #                      VitePress's own client-side links carry
    #                      the .html extension explicitly
    #   - $uri/index.html → directory index for routes built into a
    #                      folder by `cleanUrls: true`
    #
    # We deliberately do NOT fall back to /index.html on a miss —
    # the user should see VitePress's per-page 404 (which carries
    # the in-app navigation), not the homepage with a random URL.
    location / {
      try_files $uri $uri.html $uri/index.html =404;
    }
  }
}
