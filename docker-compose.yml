# Development docker-compose
# Spins up Postgres and Redis only — run the apps with `pnpm dev` on the host
# so you get HMR. Use docker-compose.local.yml if you want everything inside
# containers.

services:
  postgres:
    image: postgres:16-alpine
    container_name: trackarr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tracker}
      POSTGRES_DB: ${DB_NAME:-trackarr}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
      -c ssl=off
      -c log_connections=on
      -c log_disconnections=on
      -c log_statement=ddl
      -c max_connections=100
      -c shared_buffers=256MB
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-tracker} -d ${DB_NAME:-trackarr}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trackarr

  redis:
    image: redis:7-alpine
    container_name: trackarr-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly no
      --save ""
      --requirepass ${REDIS_PASSWORD:-trackertest}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --timeout 0
      --tcp-backlog 511
      --maxclients 1000
      --protected-mode yes
      --bind 0.0.0.0
      --loglevel warning
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-trackertest}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trackarr

networks:
  trackarr:
    driver: bridge

volumes:
  postgres_data:
