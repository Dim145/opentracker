# Local-production docker-compose
# Same architecture as docker-compose.prod.yml but without Caddy or PgBouncer:
# the three application containers expose their ports directly so you can curl
# them locally. Use this for end-to-end testing of the production image set.

services:
  web:
    image: trackarr-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: trackarr-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
      NUXT_PUBLIC_TRACKER_HTTP_URL: ${NUXT_PUBLIC_TRACKER_HTTP_URL:-http://localhost:8080/announce}
      NUXT_PUBLIC_TRACKER_UDP_URL: ${NUXT_PUBLIC_TRACKER_UDP_URL:-}
      NUXT_PUBLIC_TRACKER_WS_URL: ${NUXT_PUBLIC_TRACKER_WS_URL:-}
    ports:
      - "3000:3000"
    networks:
      - trackarr
    depends_on:
      - api

  api:
    image: trackarr-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trackarr-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NITRO_PORT: 4000
      NITRO_HOST: 0.0.0.0
      DATABASE_URL: postgres://${DB_USER:-tracker}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-trackarr}
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      IP_HASH_SECRET: ${IP_HASH_SECRET}
      UPLOADS_DIR: /app/data/uploads
      NUXT_PUBLIC_TRACKER_HTTP_URL: ${NUXT_PUBLIC_TRACKER_HTTP_URL:-http://localhost:8080/announce}
      NUXT_PUBLIC_TRACKER_UDP_URL: ${NUXT_PUBLIC_TRACKER_UDP_URL:-}
      NUXT_PUBLIC_TRACKER_WS_URL: ${NUXT_PUBLIC_TRACKER_WS_URL:-}
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/data/uploads
    networks:
      - trackarr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Healthcheck is defined in apps/api/Dockerfile (Node-based, no shell needed
    # because the runtime image is distroless). Compose inherits it.

  tracker:
    image: trackarr-tracker:latest
    build:
      context: .
      dockerfile: apps/tracker/Dockerfile
    container_name: trackarr-tracker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER:-tracker}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-trackarr}
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      IP_HASH_SECRET: ${IP_HASH_SECRET}
      TRACKER_HTTP_PORT: 8080
      TRACKER_DEBUG: ${TRACKER_DEBUG:-false}
    ports:
      - "8080:8080"
    networks:
      - trackarr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: trackarr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-trackarr}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-tracker} -d ${DB_NAME:-trackarr}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - trackarr

  redis:
    image: redis:7-alpine
    container_name: trackarr-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trackarr

networks:
  trackarr:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
