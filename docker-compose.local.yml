# Local-production docker-compose
# Same architecture as docker-compose.prod.yml but without Caddy or PgBouncer:
# the three application containers expose their ports directly so you can curl
# them locally. Use this for end-to-end testing of the production image set.

services:
  web:
    image: ghcr.io/dim145/opentracker/front-ssr:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: trackarr-web
    restart: unless-stopped
    # Runtime hardening:
    # - read_only locks the rootfs; everything in the distroless image is
    #   already there, Node only needs /tmp at runtime (V8 perf logs,
    #   ICU caches) which we provide via tmpfs.
    # - cap_drop[ALL] + no-new-privileges block any privilege escalation
    #   path even if a Nitro plugin gets compromised.
    # - pids_limit caps fork bombs from a runaway worker.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    # Cap memory so V8's heap-size autotuning sees a tight ceiling and GCs
    # eagerly. The Dockerfile sets --max-old-space-size=384 to stay below.
    mem_limit: 512m
    mem_reservation: 192m
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
      NUXT_PUBLIC_TRACKER_HTTP_URL: ${NUXT_PUBLIC_TRACKER_HTTP_URL:-http://localhost:8080/announce}
      NUXT_PUBLIC_TRACKER_UDP_URL: ${NUXT_PUBLIC_TRACKER_UDP_URL:-}
      NUXT_PUBLIC_TRACKER_WS_URL: ${NUXT_PUBLIC_TRACKER_WS_URL:-}
    ports:
      - "3000:3000"
    networks:
      - trackarr
    depends_on:
      - api

  api:
    image: ghcr.io/dim145/opentracker/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trackarr-api
    restart: unless-stopped
    # Runtime hardening (see web service above for the rationale).
    # The api also runs drizzle-kit at boot to push the schema; esbuild's
    # transient artefacts go to /tmp, which is why a tmpfs mount is
    # required even for an otherwise stateless service.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    # Cap memory so V8's heap-size autotuning sees a tight ceiling and GCs
    # eagerly. The Dockerfile sets --max-old-space-size=512 to stay below.
    mem_limit: 768m
    mem_reservation: 256m
    environment:
      NODE_ENV: production
      NITRO_PORT: 4000
      NITRO_HOST: 0.0.0.0
      DATABASE_URL: postgres://${DB_USER:-tracker}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-trackarr}
      DB_SSL: "false"
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      IP_HASH_SECRET: ${IP_HASH_SECRET}
      UPLOADS_DIR: /app/data/uploads
      NUXT_PUBLIC_TRACKER_HTTP_URL: ${NUXT_PUBLIC_TRACKER_HTTP_URL:-http://localhost:8080/announce}
      NUXT_PUBLIC_TRACKER_UDP_URL: ${NUXT_PUBLIC_TRACKER_UDP_URL:-}
      NUXT_PUBLIC_TRACKER_WS_URL: ${NUXT_PUBLIC_TRACKER_WS_URL:-}
      # Reached over the internal compose network for /api/tracker-health
      # probes. Override only if the tracker lives outside this stack.
      TRACKER_INTERNAL_URL: ${TRACKER_INTERNAL_URL:-http://tracker:8080}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      METRICS_PORT: ${METRICS_PORT:-9090}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
      # TMDb API key — when set, /api/metadata/lookup returns poster,
      # overview, genres, etc. for an IMDb/TMDb/TVDB id. Free key:
      # https://www.themoviedb.org/settings/api
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    ports:
      - "4000:4000"
      # Uncomment to scrape from the host:
      - "${METRICS_PORT:-9090}:${METRICS_PORT:-9090}"
    volumes:
      - uploads_data:/app/data/uploads
    networks:
      - trackarr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Healthcheck is defined in apps/api/Dockerfile (Node-based, no shell needed
    # because the runtime image is distroless). Compose inherits it.

  tracker:
    image: ghcr.io/dim145/opentracker/tracker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/tracker/Dockerfile
    container_name: trackarr-tracker
    restart: unless-stopped
    # The tracker is a static Go binary on `scratch`; it never writes to
    # disk, so we don't even need a tmpfs.
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER:-tracker}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-trackarr}
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      IP_HASH_SECRET: ${IP_HASH_SECRET}
      TRACKER_HTTP_PORT: 8080
      # UDP frontend (BEP 15). 6969 is the de-facto port; flip
      # TRACKER_UDP_ENABLED=false to keep the listener off.
      TRACKER_UDP_PORT: 6969
      TRACKER_UDP_ENABLED: ${TRACKER_UDP_ENABLED:-false}
      TRACKER_DEBUG: ${TRACKER_DEBUG:-false}
      # Caddy proxies BitTorrent announces on `/announce` and on the
      # `tracker.*` subdomain. Without trusting its X-Real-IP /
      # X-Forwarded-For headers every peer ends up registered with
      # Caddy's container IP and clients can't reach each other.
      TRUST_PROXY: "true"
    ports:
      - "8080:8080"
      - "6969:6969/udp"
    networks:
      - trackarr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: trackarr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-trackarr}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-tracker} -d ${DB_NAME:-trackarr}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - trackarr

  redis:
    image: redis:7-alpine
    container_name: trackarr-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trackarr

networks:
  trackarr:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
