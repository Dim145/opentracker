# Production Docker Compose Configuration
# Three application containers (web/api/tracker) + Caddy + PgBouncer + Postgres + Redis.

services:
  # =============================================================================
  # REVERSE PROXY - Caddy with automatic HTTPS
  # =============================================================================
  caddy:
    image: caddy:2-alpine
    container_name: trackarr-caddy
    restart: always
    # Caddy already runs from a tight image; lock the rootfs and only
    # expose its three persistent directories as named volumes.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      # Required to bind the privileged ports 80 / 443.
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      TRACKER_DOMAIN: ${TRACKER_DOMAIN:-tracker.localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - trackarr-public
      - trackarr-internal
    depends_on:
      - web
      - api
      - tracker
    deploy:
      resources:
        limits:
          memory: 256M
          # pids lives inside deploy.resources.limits because the
          # compose spec rejects setting both `pids_limit` and the
          # nested form on the same service when a `deploy:` block
          # already exists.
          pids: 100
        reservations:
          memory: 64M

  # =============================================================================
  # WEB - Nuxt SSR frontend
  # =============================================================================
  web:
    image: ghcr.io/dim145/opentracker/front-ssr:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: trackarr-web
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      # SSR fetches need to reach the API container internally
      API_INTERNAL_URL: http://api:4000
      # Tracker URLs displayed to users (read at runtime by Nuxt)
      NUXT_PUBLIC_TRACKER_HTTP_URL: ${NUXT_PUBLIC_TRACKER_HTTP_URL:-https://localhost/announce}
      NUXT_PUBLIC_TRACKER_UDP_URL: ${NUXT_PUBLIC_TRACKER_UDP_URL:-udp://localhost/announce}
      NUXT_PUBLIC_TRACKER_WS_URL: ${NUXT_PUBLIC_TRACKER_WS_URL:-ws://localhost:8082}
    expose:
      - "3000"
    networks:
      - trackarr-public
      - trackarr-internal
    depends_on:
      - api
    deploy:
      resources:
        limits:
          # Must exceed --max-old-space-size (384M, set in apps/web/Dockerfile)
          # plus V8 isolate / SSR scratch overhead (~100–150 MB).
          memory: 512M
          pids: 200
        reservations:
          memory: 192M
    # Healthcheck is defined in apps/web/Dockerfile (Node-based, no shell needed
    # because the runtime image is distroless). Compose inherits it.

  # =============================================================================
  # API - Nitro standalone (all /api/* routes)
  # =============================================================================
  api:
    image: ghcr.io/dim145/opentracker/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trackarr-api
    restart: always
    read_only: true
    tmpfs:
      # esbuild (used by drizzle-kit's boot-time `push`) writes its
      # transpiled bundle to $TMPDIR. Without this mount the schema push
      # would fail with EROFS on first boot.
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      NITRO_PORT: 4000
      NITRO_HOST: 0.0.0.0
      # Database (through PgBouncer at runtime)
      DATABASE_URL: postgres://${DB_USER:-tracker}:${DB_PASSWORD:-tracker}@pgbouncer:6432/${DB_NAME:-trackarr}?sslmode=disable
      MIGRATIONS_DATABASE_URL: postgres://${DB_USER:-tracker}:${DB_PASSWORD:-tracker}@postgres:5432/${DB_NAME:-trackarr}?sslmode=disable
      DB_SSL: "false"
      # Redis
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Auth/session secrets
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      IP_HASH_SECRET: ${IP_HASH_SECRET}
      # Caddy is in front — trust proxy headers for real client IPs
      TRUST_PROXY: "true"
      # Uploads directory (volume-mounted)
      UPLOADS_DIR: /app/data/uploads
      # Tracker URLs are also exposed by the API for endpoints like
      # GET /api/torrents/[hash]/download (announce embedded in .torrent files).
      NUXT_PUBLIC_TRACKER_HTTP_URL: ${NUXT_PUBLIC_TRACKER_HTTP_URL:-https://localhost/announce}
      NUXT_PUBLIC_TRACKER_UDP_URL: ${NUXT_PUBLIC_TRACKER_UDP_URL:-udp://localhost/announce}
      NUXT_PUBLIC_TRACKER_WS_URL: ${NUXT_PUBLIC_TRACKER_WS_URL:-ws://localhost:8082}
      # Reached over the internal compose network for /api/tracker-health
      # probes. Override only if the tracker lives outside this stack.
      TRACKER_INTERNAL_URL: ${TRACKER_INTERNAL_URL:-http://tracker:8080}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    expose:
      - "4000"
    volumes:
      - uploads_data:/app/data/uploads
    networks:
      - trackarr-public
      - trackarr-internal
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # Must exceed --max-old-space-size (512M, set in apps/api/Dockerfile)
          # plus V8 isolate / native module overhead (~150–200 MB).
          memory: 768M
          pids: 200
        reservations:
          memory: 256M
    # Healthcheck is defined in apps/api/Dockerfile (Node-based, no shell needed
    # because the runtime image is distroless). Compose inherits it.

  # =============================================================================
  # TRACKER - BitTorrent HTTP tracker (standalone)
  # =============================================================================
  tracker:
    image: ghcr.io/dim145/opentracker/tracker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/tracker/Dockerfile
    container_name: trackarr-tracker
    restart: always
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER:-tracker}:${DB_PASSWORD:-tracker}@pgbouncer:6432/${DB_NAME:-trackarr}?sslmode=disable
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      IP_HASH_SECRET: ${IP_HASH_SECRET}
      TRACKER_HTTP_PORT: 8080
      TRACKER_DEBUG: ${TRACKER_DEBUG:-false}
      # Caddy proxies BitTorrent announces on `/announce` and on the
      # `tracker.*` subdomain. Without trusting its X-Real-IP /
      # X-Forwarded-For headers every peer ends up registered with
      # Caddy's container IP and clients can't reach each other.
      TRUST_PROXY: "true"
    expose:
      - "8080"
    networks:
      - trackarr-public
      - trackarr-internal
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 100
        reservations:
          memory: 128M

  # =============================================================================
  # DATABASE - PostgreSQL
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: trackarr-db
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${DB_USER:-tracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tracker}
      POSTGRES_DB: ${DB_NAME:-trackarr}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
      -c ssl=off
      -c log_connections=on
      -c log_disconnections=on
      -c log_statement=ddl
      -c log_min_duration_statement=1000
      -c max_connections=200
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
      -c effective_cache_size=1536MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-tracker} -d ${DB_NAME:-trackarr}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - trackarr-internal
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # =============================================================================
  # CONNECTION POOLING - PgBouncer
  # =============================================================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: trackarr-pgbouncer
    restart: always
    environment:
      DATABASE_URL: postgres://${DB_USER:-tracker}:${DB_PASSWORD:-tracker}@postgres:5432/${DB_NAME:-trackarr}
      DB_HOST: postgres
      DB_USER: ${DB_USER:-tracker}
      DB_PASSWORD: ${DB_PASSWORD:-tracker}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      MAX_CLIENT_CONN: 500
      MAX_DB_CONNECTIONS: 100
      LISTEN_PORT: 6432
    expose:
      - "6432"
    networks:
      - trackarr-internal
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # CACHE - Redis with persistence
  # =============================================================================
  redis:
    image: redis:7
    container_name: trackarr-redis
    restart: always
    # Redis only writes to /data (volume-mounted below) — locking the
    # rootfs is safe. Minimal tmpfs covers any transient files Redis
    # might touch (e.g. RDB temp file before rename, latency monitor).
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --save 900 1
      --save 300 10
      --save 60 10000
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --timeout 0
      --tcp-backlog 511
      --maxclients 5000
      --protected-mode yes
      --bind 0.0.0.0
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG ""
      --rename-command KEYS ""
      --rename-command SHUTDOWN ""
      --loglevel warning
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - trackarr-internal
    deploy:
      resources:
        limits:
          memory: 768M
          pids: 100
        reservations:
          memory: 256M

networks:
  trackarr-public:
    driver: bridge
  trackarr-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  caddy_logs:
    driver: local
  uploads_data:
    driver: local
